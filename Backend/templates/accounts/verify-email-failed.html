{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verification Failed - NeuroNest</title>
  <link rel="stylesheet" href="/static/css/patient-auth.css">
</head>
<body>

<div class="auth-wrap">
  <div class="card">
    <h1>Verification failed</h1>
    <p>The verification link is invalid or expired.</p>

    <div class="alert danger">
      Please sign up again or request a new verification email (we can add “resend” next).
    </div>

    <hr class="hr" />

    <div class="actions">
      <a class="btn primary" href="/patient/signup/">Go to signup</a>
      <a class="btn ghost" href="/patient/login/">Go to login</a>
    </div>
  </div>
</div>

</body>
</html>
